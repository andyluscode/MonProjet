<!DOCTYPE html>
<html lang="en">
<head>

<body>
 <div class="haut">

 </div>  
 <br>
  <form action="">
    <label for="">Nom du medicament</label>
    <input type="text" placeholder="Entrez le nom du medicament"><br>
    <label for="">Categorie</label>
    <select name="" id="">
        <option value="">Selectionner une categorie</option>
        <option value="">Comprime</option>
        <option value="">Sirop</option>
    </select><br>

    <label for="">Prix de vente</label>
    <input type="text" placeholder="A quel prix allez vous le vendre"><br>
    <label for="">Emplacement du medicament</label>
    <input type="text" placeholder="0ù sera situe votre medicament"><br><br>

    <button type="reset">Annuler</button> <button type="submit">Enregistrer</button>
  </form>
